<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operation Lost - 404</title>
  <link rel="stylesheet" href="css/opus-core.css">
  <style>
    body {
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }
    .error-container {
      max-width: 500px;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }
    h1 {
      font-size: 5rem;
      margin: 0;
      color: #00326b;
      font-weight: 800;
    }
    h2 {
      margin: 10px 0 20px 0;
      color: #1e293b;
    }
    p {
      color: #64748b;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #00326b;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .back-btn:hover {
      background: #004a99;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Operation Not Found</h2>
    <p>The coordinates you entered do not match any known operation in the Opus ecosystem. It's possible the record was moved or archived.</p>
    <a href="index.html" class="back-btn">Return to Ops Hub</a>
  </div>
</body>
</html>
