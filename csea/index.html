<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSEA Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=20260108" />
  <link rel="stylesheet" href="/css/base.css?v=20260108" />
  <link rel="stylesheet" href="/css/opus-core.css?v=20260108" />
  <link rel="stylesheet" href="/css/home.css?v=20260108" />
  <link rel="stylesheet" href="/css/csea.css?v=20260108" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#00326b',
            primaryDark: '#002050',
            primaryLight: '#004a9c'
          }
        }
      }
    }
  </script>
</head>
<body>
  <div class="planner-container">
    <aside class="planner-sidebar">
      <a href="/" class="planner-sidebar-item">Home</a>
      <a href="/csea/" class="planner-sidebar-item active">CSEA</a>
      <a href="/finance.html" class="planner-sidebar-item">Finance</a>
      <a href="/health.html" class="planner-sidebar-item">Health</a>
      <a href="/hoa.html" class="planner-sidebar-item">HOA</a>
      <a href="/icaap.html" class="planner-sidebar-item">iCAAP</a>
      <a href="/planning.html" class="planner-sidebar-item">Planning</a>
    </aside>

    <div class="planner-content">
      <header class="planner-header">
        <div class="planner-header-left">
          <h1>CSEA Hub</h1>
          <p>Stewarded member issues at a glance</p>
        </div>
        <div class="planner-header-right">
          <div class="csea-cta-row">
            <button type="button" id="grievance-pill-btn" class="csea-cta-pill">
              <i class="fa-solid fa-capsules text-base"></i>
              <span>Grievance Form</span>
            </button>
            <a href="/csea/csea-meeting-notes.html" class="csea-cta-pill">Meeting Notes</a>
            <a href="/csea/csea-notes.html" class="csea-cta-pill">Notes</a>
            <a href="/csea/issue-log.html" class="csea-cta-pill">Issue Log</a>
          </div>
          <div class="planner-header-date" id="today-date"></div>
        </div>
      </header>

      <main class="planner-main csea-main-area">
        <section class="planner-section issue-summary-section" id="issue-summary">
          <div class="planner-section-header">
            <span class="planner-section-icon">📊</span>
            <h2 class="planner-section-title">Issue Summary</h2>
          </div>
          <div class="csea-cta-toolbar">
            <button type="button" class="csea-cta-pill">
              <i class="fa-solid fa-capsules"></i>
              <span>Grievance Form</span>
            </button>
            <a href="/csea/csea-meeting-notes.html" class="csea-cta-pill">Meeting Notes</a>
            <a href="/csea/csea-notes.html" class="csea-cta-pill">Notes</a>
            <a href="/csea/issue-log.html" class="csea-cta-pill">Issue Log</a>
          </div>
          <div class="grid grid-cols-4 gap-4 csea-stats-grid">
            <div class="bg-white rounded-lg shadow-md p-4 csea-stat-card border border-gray-100">
              <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Total Issues</p>
              <p class="text-2xl font-bold text-primary mt-1" id="stat-total">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4 csea-stat-card border border-gray-100">
              <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Open</p>
              <p class="text-2xl font-bold text-blue-600 mt-1" id="stat-open">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4 csea-stat-card border border-gray-100">
              <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider">In Progress</p>
              <p class="text-2xl font-bold text-yellow-600 mt-1" id="stat-progress">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-4 csea-stat-card border border-gray-100">
              <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Resolved</p>
              <p class="text-2xl font-bold text-green-600 mt-1" id="stat-resolved">0</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script src="/js/opus-data.js?v=20260108"></script>
  <script src="/js/csea.js?v=20260108"></script>
  <script src="/js/csea-ui.js?v=20260108"></script>
  <script>
    const cseaTodayDate = document.getElementById('today-date');
    if (cseaTodayDate) {
      cseaTodayDate.textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }
  </script>
</body>
</html>
